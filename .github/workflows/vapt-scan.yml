# AutoVAPT: Build image, run security scan, upload HTML report
# Target: http://testphp.vulnweb.com/ (Acunetix test/demo site)

name: VAPT Scan

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t autovapt .

      - name: Run VAPT scan
        run: |
          mkdir -p reports
          docker run --rm \
            -v "${{ github.workspace }}/reports:/app/reports" \
            autovapt \
            --target "http://testphp.vulnweb.com/" \
            --no-tool-check

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: vapt-html-report
          path: reports/*.html
